<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fale Comigo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="/img/ovelha-cem-icon.png" type="image/x-icon">
</head>
<body>

  <div class="ovelha-decorativa" aria-hidden="true">
    <img src="/img/ovelha-cem-perfil.png" alt="">
  </div>

  <main class="cartao">
    <header class="cabecalho">
      <span class="eyebrow">Ovelha Cem</span>
      <h1>Fale Comigo</h1>
      <p class="subtitulo">Vamos caminhar juntos. Deixe sua mensagem, uma oração ou um pedido — responderei com carinho.</p>
    </header>

    <a class="botao-instagram" href="https://instagram.com/matheusesant/" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="2" width="20" height="20" rx="5"></rect>
        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
      </svg>
      Meu instagram
    </a>

    <div class="divisor"><span>ou envie uma mensagem</span></div>

    <form id="formContato" novalidate>
      <div class="campo">
        <label for="nome">Seu nome</label>
        <input type="text" id="nome" name="nome" placeholder="Maria de Nazaré" required>
        <span class="erro" data-erro-para="nome"></span>
      </div>

      <div class="campo">
        <label for="email">Seu email</label>
        <input type="email" id="email" name="email" placeholder="maria@email.com" required>
        <span class="erro" data-erro-para="email"></span>
      </div>

      <div class="campo">
        <label for="mensagem">Sua mensagem</label>
        <textarea id="mensagem" name="mensagem" rows="5" placeholder="Escreva aqui o que está em seu coração..." required></textarea>
        <span class="erro" data-erro-para="mensagem"></span>
      </div>

      <button type="submit" class="botao-enviar">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M22 2 11 13"></path>
          <path d="M22 2 15 22l-4-9-9-4 20-7z"></path>
        </svg>
        Enviar por email
      </button>

      <p class="mensagem-status" id="statusEnvio" role="status" aria-live="polite"></p>
    </form>
  </main>

  <script src="script.js"></script>
</body>
</html>
