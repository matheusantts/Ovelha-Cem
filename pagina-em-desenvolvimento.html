<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina em Desenvolvimento</title>

    <link rel="icon" type="image/png" href="img/ovelha-cem-icon.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        :root {
            --dourado-divino: #D4AF37;
            --branco-cordeiro: #F8F9FA;
            --bege-la: #E8DCC4;
            --terracota-humildade: #A0522D;
            --verde-pastagem: #556B2F;
            --vermelho-liturgico: #8B0000;
        }

        body {
            background-color: var(--branco-cordeiro);
            width: 100%;
            min-height: 100vh;

            display: grid;
            place-items: center;

            /* Evita que o card encoste nas bordas em telas pequenas */
            padding: 24px 16px;
        }

        main {
            width: min(550px, 100%);   /* nunca ultrapassa 550px, mas encolhe em telas menores */
            min-height: 450px;
            border-radius: 5px;

            display: grid;
            place-items: center;
            text-align: center;

            background-color: var(--branco-cordeiro);
            border: 1px solid #e1d7c1;
            box-shadow: 0px 0px 70px 150px rgba(232, 220, 196, 0.5);

            /* Padding interno responsivo: generoso no desktop, compacto no mobile */
            padding: clamp(24px, 6vw, 48px) clamp(16px, 5vw, 40px);
        }

        img {
            /* A imagem escala suavemente entre 100px (mobile pequeno) e 150px (desktop) */
            width: clamp(100px, 28vw, 150px);
            border-radius: 50%;
            box-shadow: 0px 0px 50px 20px rgba(232, 220, 196, 0.5);
            border: 1px solid #e1d7c1;

            animation: 2.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite animacao-img;
        }

        main div {
            gap: clamp(16px, 4vw, 30px); /* gap menor em mobile, igual ao original no desktop */

            display: grid;
            place-items: center;

            width: 100%; /* garante que o div interno não estoure o card */
        }

        h1 {
            /* Escala de ~26px (mobile pequeno) até 45px (desktop) */
            font-size: clamp(26px, 8vw, 45px);
            font-family: Georgia, 'Times New Roman', Times, serif;
            line-height: 1.15;
        }

        .linha {
            background-color: var(--dourado-divino);

            /* A linha mantém a proporção visual, mas com mínimo e máximo definidos */
            width: clamp(80px, 30%, 165px);
            height: 2px;
            padding: 0px;

            display: grid;
        }

        p {
            color: var(--verde-pastagem);
            /* Texto legível em qualquer breakpoint */
            font-size: clamp(13px, 3.5vw, 16px);
            line-height: 1.6;
        }

        /* Em telas muito pequenas o <br> dentro do <p> pode gerar uma quebra desnecessária;
           removemos para deixar o texto fluir naturalmente */
        @media (max-width: 360px) {
            p br {
                display: none;
            }
        }

        .footer {
            font-size: clamp(10px, 2.5vw, 13px);
            color: var(--vermelho-liturgico);
        }

        @keyframes animacao-img {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <main>

        <div>
            <img src="img/ovelha-cem-perfil.png" alt="Ovelha">
            <h1>
                <span
                    style="color: var(--vermelho-liturgico); font-family: Georgia, 'Times New Roman', Times, serif;">Em</span>
                <span
                    style="color: var(--dourado-divino); font-family: Georgia, 'Times New Roman', Times, serif;">Construção</span>
            </h1>
            <div class="linha"></div>
            <p>Voltaremos em breve com algo ainda melhor. <br> Obrigado pela sua paciência.</p>
            <p class="footer">@ Matheus Santos 2026 - EM DESENVOLVIMENTO</p>
        </div>
    </main>

</body>

</html>
