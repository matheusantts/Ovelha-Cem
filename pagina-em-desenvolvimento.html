<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina em Desenvolvimento</title>

    <link rel="icon" type="image/png" href="img/ovelha-cem-icon.png">


    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        :root {
            --dourado-divino: #D4AF37;
            /* Realeza de Jesus e o Ouro da Igreja */
            --branco-cordeiro: #F8F9FA;
            /* Pureza e a Ovelha (um branco levemente suave) */
            --bege-la: #E8DCC4;
            /* A lã da ovelha e acolhimento */
            --terracota-humildade: #A0522D;
            /* Terra do caminho e o hábito religioso */
            --verde-pastagem: #556B2F;
            /* Esperança e o aprisco (Verde Oliva Escuro) */
            --vermelho-liturgico: #8B0000;
            /* Sacrifício de Cristo (Vermelho Sangue/Vinho) */
        }

        body {
            background-color: var(--branco-cordeiro);
            width: 100%;
            height: 100%;

            display: grid;
            place-items: center;
            min-height: 100vh;
        }

        main {
            width: 550px;
            height: 450px;
            border-radius: 5px;

            display: grid;
            place-items: center;
            text-align: center;

            background-color: var(--branco-cordeiro);
            border: 1px solid #e1d7c1;
            box-shadow: 0px 0px 70px 150px rgba(232, 220, 196, 0.5);
        }

        img {
            width: 150px;
            border-radius: 50%;
            box-shadow: 0px 0px 50px 20px rgba(232, 220, 196, 0.5);
            border: 1px solid #e1d7c1;

            animation: 2.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite animacao-img;
        }

        main div {
            gap: 30px;

            display: grid;
            place-items: center;
        }

        h1 {
            font-size: 45px;
            font-family: Georgia, 'Times New Roman', Times, serif;
        }

        .linha {
            background-color: var(--dourado-divino);

            width: 30%;
            height: 2px;
            padding: 0px;

            display: grid;

        }

        p {
            color: var(--verde-pastagem);
        }

        .footer {
            font-size: smaller;
            color: var(--vermelho-liturgico);
        }

        @keyframes animacao-img {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <main>

        <div>
            <img src="img/ovelha-cem-perfil.png" alt="Ovelha">
            <h1>
                <span
                    style="color: var(--vermelho-liturgico); font-family: Georgia, 'Times New Roman', Times, serif;">Em</span>
                <span
                    style="color: var(--dourado-divino); font-family: Georgia, 'Times New Roman', Times, serif;">Construção</span>
            </h1>
            <div class="linha"></div>
            <p>Voltaremos em breve com algo ainda melhor. <br> Obrigado pela sua paciência.</p>
            <p class="footer">@ 2026 - EM DESENVOLVIMENTO</p>
        </div>
    </main>

</body>

</html>
